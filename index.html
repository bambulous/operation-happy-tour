<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Happy Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#f6ecd6;
    --parchment-dark:#ecdcb8;
    --ink:#3b2a1a;
    --forest:#3f7a4a;
    --forest-dark:#2c5934;
    --sky:#7fb8d9;
    --gold:#e0a83e;
    --heart:#e2636b;
    --paper-line:#d8c9a3;
    --bad:#a1442c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'VT323', monospace;
    font-size:19px;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 10%, #cfe8c9 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, #bfe0ee 0%, transparent 40%),
      linear-gradient(180deg,#e8f3e2 0%, #dcefe0 40%, #cfe6d6 100%);
    padding:20px 12px 50px;
    image-rendering:pixelated;
  }
  .wrap{max-width:920px;margin:0 auto;}
  .pixel-font{font-family:'Press Start 2P', monospace;}

  .pixel-panel{
    background:var(--parchment);
    border:4px solid var(--ink);
    box-shadow:0 0 0 4px var(--parchment), 0 0 0 8px var(--ink), 0 8px 0 0 rgba(0,0,0,0.25);
    border-radius:2px;
  }

  .sign{
    background:linear-gradient(180deg,#9c6a3e,#7a4a26);
    padding:14px 18px;
    text-align:center;
    position:relative;
  }
  .sign h1{
    font-family:'Press Start 2P', monospace;
    color:#fff6e2;
    font-size:clamp(13px,3vw,18px);
    margin:0 0 8px;
    line-height:1.6;
  }
  .sign .sub{
    color:#ffe9c2;
    font-size:16px;
  }

  .rep{
    margin-top:12px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .rep .stars{color:var(--gold); letter-spacing:2px; font-size:20px;}
  .rep .score-live{font-family:'Press Start 2P'; font-size:12px; color:var(--forest-dark);}
  .rep .label{font-family:'Press Start 2P'; font-size:9px; color:#5a3419; display:block; margin-bottom:2px;}

  .card{
    margin-top:14px;
    padding:20px;
    position:relative;
  }
  .nav-row{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .btn-nav{
    background:#fff;
    color:var(--ink);
    border:3px solid var(--paper-line);
    box-shadow:none;
    font-size:10px;
    padding:9px 12px;
  }
  .btn-nav:hover{border-color:var(--forest); background:#f2f9f0;}

  .stage-title{
    font-family:'Press Start 2P';
    color:var(--forest-dark);
    font-size:13px;
    margin:0 0 6px;
    line-height:1.8;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .skill-badge{
    font-size:16px;
    color:#7a4a26;
    margin-bottom:10px;
  }
  .progress-label{
    font-size:15px;
    color:#8a7350;
    margin-bottom:10px;
  }
  .qtype-label{
    display:inline-block;
    font-family:'Press Start 2P';
    font-size:9px;
    background:#fff2cf;
    border:2px dashed var(--gold);
    padding:5px 8px;
    margin-bottom:10px;
  }
  .situation{
    background:#fff;
    border:3px solid var(--paper-line);
    padding:10px 14px;
    font-size:19px;
    margin-bottom:12px;
  }
  .row-flex{display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap;}
  .chat-bubble{
    background:#fff;
    border:3px solid var(--paper-line);
    padding:12px 16px;
    flex:1 1 260px;
    font-size:20px;
    line-height:1.4;
    position:relative;
  }
  .chat-bubble .who{
    font-family:'Press Start 2P';
    font-size:9px;
    color:#7a4a26;
    display:block;
    margin-bottom:6px;
  }
  .prompt-box{
    font-size:20px;
    margin:14px 0 10px;
    line-height:1.4;
  }

  .avatar{
    width:110px;height:170px;
    background-image:url('assets/tour-officer-sprites.png');
    background-repeat:no-repeat;
    background-size:1165px 777px;
    image-rendering:pixelated;
    flex:0 0 auto;
    border:3px solid var(--paper-line);
    background-color:#eaf3e6;
  }
  .avatar.idle{background-position:-505px -72px;}
  .avatar.talk{background-position:-1055px -72px;}
  .avatar-portrait{
    width:220px;height:148px;
    background-image:url('assets/tour-officer-sprites.png');
    background-repeat:no-repeat;
    background-size:690px 460px;
    background-position:-7px -76px;
    image-rendering:pixelated;
    border:3px solid var(--paper-line);
    margin:0 auto 10px;
  }

  .choices{display:flex; flex-direction:column; gap:10px; margin-top:10px;}
  .choice-btn{
    text-align:left;
    background:#fff;
    border:3px solid var(--paper-line);
    padding:12px 14px;
    font-family:'VT323';
    font-size:19px;
    cursor:pointer;
    color:var(--ink);
    line-height:1.35;
  }
  .choice-btn:hover:not(:disabled){border-color:var(--forest); background:#f2f9f0;}
  .choice-btn:disabled{cursor:default;}
  .choice-btn.opt-correct{border-color:var(--forest); background:#e2f4e0;}
  .choice-btn.opt-wrong{border-color:var(--heart); background:#fdecec;}
  .choice-letter{
    font-family:'Press Start 2P'; font-size:10px; color:#7a4a26; margin-right:8px;
  }

  .fill-input, .short-textarea{
    width:100%;
    border:3px solid var(--paper-line);
    padding:10px 12px;
    font-family:'VT323';
    font-size:19px;
    margin-top:10px;
  }
  .short-textarea{min-height:90px; resize:vertical;}

  button{
    font-family:'Press Start 2P';
    font-size:12px;
    border:3px solid var(--ink);
    padding:12px 18px;
    cursor:pointer;
    color:#fff;
    line-height:1.6;
  }
  button:active{transform:translateY(2px);}
  button:disabled{opacity:0.5; cursor:default;}
  .btn-forest{background:var(--forest); box-shadow:0 4px 0 var(--forest-dark);}
  .btn-gold{background:var(--gold); box-shadow:0 4px 0 #a97a1f; color:#4a3407;}
  .btn-sky{background:var(--sky); box-shadow:0 4px 0 #4f8aab;}
  .btn-row{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;}

  .feedback{
    margin-top:16px;
    border:3px solid var(--paper-line);
    padding:14px;
    font-size:19px;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback.ok{background:#e2f4e0; border-color:var(--forest);}
  .feedback.mid{background:#fdf2dc; border-color:var(--gold);}
  .feedback.bad{background:#fdecec; border-color:var(--heart);}
  .feedback .reaction{font-family:'Press Start 2P'; font-size:12px; margin-bottom:8px; display:block;}
  .criteria-list{list-style:none; margin:8px 0 0; padding:0;}
  .criteria-list li{margin-bottom:4px;}

  .start-card{text-align:center;}
  .start-card input{
    width:100%;
    max-width:320px;
    padding:9px 10px;
    border:3px solid var(--paper-line);
    font-family:'VT323';
    font-size:19px;
    margin:6px 0;
  }
  .start-card p{font-size:18px;}
  .start-card ul{
    text-align:left;
    font-size:17px;
    line-height:1.55;
    padding-left:22px;
    max-width:560px;
    margin:10px auto;
  }
  .field-label{font-family:'Press Start 2P'; font-size:10px; color:#5a3419; display:block; margin-top:14px;}

  .narration-card{text-align:center;}
  .narration-text{
    background:#fff;
    border:3px solid var(--paper-line);
    padding:16px;
    font-size:21px;
    line-height:1.5;
    margin:14px 0;
    text-align:left;
  }

  .score-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:16px 0;
  }
  .score-box{
    background:#fff;
    border:3px solid var(--paper-line);
    padding:10px;
    text-align:center;
  }
  .score-box .n{font-family:'Press Start 2P'; font-size:18px; color:var(--forest-dark);}
  .score-box .l{font-size:14px; color:#8a7350;}
  .stamp{
    font-family:'Press Start 2P';
    display:inline-block;
    border:4px double var(--heart);
    color:var(--heart);
    padding:10px 16px;
    font-size:13px;
    transform:rotate(-3deg);
    margin:12px 0;
    line-height:1.8;
  }
  .save-status{font-size:16px; margin-top:10px;}

  /* Village map */
  .map-wrap{
    position:relative;
    width:100%;
    border:3px solid var(--ink);
  }
  .map-wrap img{display:block; width:100%; height:auto; image-rendering:pixelated;}
  .hotspot{
    position:absolute;
    width:15%; height:18%;
    transform:translate(-50%,-50%);
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
  }
  .hotspot .ring{
    width:100%; height:100%;
    border-radius:50%;
    border:4px solid var(--gold);
    box-shadow:0 0 0 4px rgba(255,255,255,0.5);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.55; transform:scale(0.92);}
    50%{opacity:1; transform:scale(1.05);}
  }
  .hotspot.locked{cursor:not-allowed;}
  .hotspot.locked .badge{
    width:100%; height:100%; border-radius:50%;
    background:rgba(59,42,26,0.55);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .hotspot.done .badge{
    width:100%; height:100%; border-radius:50%;
    background:rgba(63,122,74,0.35);
    border:4px solid var(--forest);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
  }
  .map-caption{
    text-align:center;
    font-size:18px;
    margin-top:10px;
    color:#4a5a44;
  }

  .leaderboard-table{width:100%; border-collapse:collapse; margin-top:12px; font-size:17px;}
  .leaderboard-table th, .leaderboard-table td{border:2px solid var(--paper-line); padding:7px 9px; text-align:left;}
  .leaderboard-table th{background:#fff2cf; font-family:'Press Start 2P'; font-size:9px;}

  footer{text-align:center; font-size:14px; color:#7a8f7a; margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="sign pixel-panel">
    <h1>Operation Happy Tour</h1>
    <div class="sub">Happy Journey Tours &mdash; Make Every Tourist Smile!</div>
  </div>

  <div class="rep pixel-panel" id="repBar">
    <div><span class="label">Agency Rank</span><span class="stars" id="starDisplay">&#9733;&#9733;&#9733;&#9733;&#9733;</span> <span id="rankLabel"></span></div>
    <div class="score-live" id="scoreDisplay"></div>
  </div>

  <div class="card pixel-panel" id="card"></div>

  <footer>Built for classroom use &mdash; Basic Grammar in Context &middot; RMUTK</footer>
</div>

<script>
/* ---------------------------------------------------
   CONFIG
--------------------------------------------------- */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwy4Iuf7mP4d2gqA2dRHUpBO2PctebStWkM2eyFpg2QFSW0mVnwvqEIc_-GDmVsVeRY/exec";
const LEADERBOARD_KEY = "operationHappyTourLeaderboard";

/* ---------------------------------------------------
   MASTER QUESTION BANK — 8 stages
--------------------------------------------------- */
const stages = [
  {
    title: `Starting the Chat`,
    skill: `Warm Greeting (Polite Communication)`,
    intro: `A new message just arrived in your inbox. Someone found Happy Journey Tours online for the first time. First impressions matter — let's begin.`,
    client: `Hi, I saw your page online. Do you organise tours?`,
    outro: `Great start! The client is interested. Now they need to know more about what's actually included in the tour.`,
    questions: [
      { kind:"choice", label:`True / False`, points:2,
        prompt:`'Could you...' is more indirect and polite than 'Can you...' when starting a request.`,
        options:[`True`,`False`], correctIndex:0,
        explanation:`"Could" เป็น modal verb ที่ใช้แสดงความสุภาพ/อ้อมมากกว่า "Can" ในบริบทการขอความช่วยเหลือ` },
      { kind:"fill", label:`Fill in the Blank`, points:2,
        prompt:`Good afternoon! ___ you like some help planning your trip today?`,
        accepted:[`would`],
        explanation:`"Would you like...?" เป็นรูปแบบสุภาพมาตรฐานสำหรับการเสนอความช่วยเหลือ` },
      { kind:"choice", label:`Multiple Choice`, points:3,
        prompt:`The client sends this first message: "Hi, I saw your page online. Do you organise tours?" What is the best way to open your reply?`,
        options:[
          `Yes, we do. What kind of tour are you looking for?`,
          `Good morning! Yes, we do. How can I help you plan your trip?`,
          `We do offer several tours, thank you for contacting us.`,
          `Yes we do tour. Please tell me what you want.`
        ], correctIndex:1,
        explanation:`B มีองค์ประกอบครบ — คำทักทาย + ยืนยันบริการ + คำถามชวนคุยต่อ ส่วน A ขาดคำทักทาย, C ปิดบทสนทนาไม่ชวนคุยต่อ, D ขาด -s ที่ "tours" และน้ำเสียงสั่งการเกินไป` },
      { kind:"short", label:`Short Response`,
        prompt:`Write a warm, professional opening reply to the client's message above.`,
        criteria:[
          { label:`ใช้คำเปิดสุภาพ (Thank you / Happy to help / Good morning)`, points:1, test:r=>/\b(thank you|happy to help|good (morning|afternoon|evening))\b/i.test(r) },
          { label:`กล่าวถึงชื่อบริษัทหรือยืนยันบริการ`, points:1, test:r=>/\b(happy journey tours|yes,?\s*we do|we organi[sz]e tours|we can help|we offer)\b/i.test(r) },
          { label:`ปิดท้ายด้วยคำถามชวนคุยต่อ`, points:1, test:r=>/\?\s*$/.test(r.trim()) }
        ] }
    ]
  },
  {
    title: `Customer Enquiry`,
    skill: `Information Gathering`,
    client: `We are 4 people. Can you helps us book a tour next weekend?`,
    outro: `The group is confirmed. Now it's time to work out the details — what time things happen, and what's on the schedule.`,
    questions: [
      { kind:"choice", label:`Interpret the Message`, points:3,
        prompt:`What does the client want to know?`,
        options:[
          `The exact price of every hotel in the city`,
          `Whether a tour can be arranged for 4 people next weekend`,
          `Visa information for 4 people`,
          `A change to a booking made last week`
        ], correctIndex:1,
        explanation:`ข้อความระบุจำนวนคนและช่วงเวลาชัดเจน ไม่มีการพูดถึงวีซ่าหรือการจองเดิม` },
      { kind:"choice", label:`True / False`, points:2,
        prompt:`'Can you helps us?' is grammatically correct.`,
        options:[`True`,`False`], correctIndex:1,
        explanation:`หลัง modal verb "can" ต้องตามด้วยกริยารูปพื้นฐานเสมอ (help ไม่ใช่ helps)` },
      { kind:"fill", label:`Fill in the Blank`, points:2,
        prompt:`Yes, we can definitely ___ you book a tour next weekend.`,
        accepted:[`help`],
        explanation:`หลัง "can" ใช้กริยารูปพื้นฐาน ไม่เติม -s` },
      { kind:"short", label:`Short Response`,
        prompt:`Write your full reply, confirming you can help and asking one useful follow-up question.`,
        criteria:[
          { label:`มี politeness pattern (Could you / Would it be possible / happy to)`, points:1, test:r=>/\b(could you|would it be possible|happy to|we would be happy)\b/i.test(r) },
          { label:`ใช้ "help" ถูกต้อง (ไม่ใช่ "helps")`, points:1, test:r=>/\bhelp\b/i.test(r) && !/\bhelps\b/i.test(r) },
          { label:`ใช้คำศัพท์ "itinerary"`, points:1, test:r=>/\bitinerary\b/i.test(r) }
        ] }
    ]
  },
  {
    title: `Tour Planning`,
    skill: `Schedule Master`,
    client: `What time it start? Also does it includes lunch?`,
    outro: `The schedule is set. Now the client is ready to talk business — payment.`,
    questions: [
      { kind:"choice", label:`Interpret the Message`, points:3,
        prompt:`How many separate questions is the client actually asking?`,
        options:[`1`,`2`,`3`,`4`], correctIndex:1,
        explanation:`มีสองคำถามแยกกัน คือเวลาเริ่มทัวร์ และเรื่องมื้ออาหารกลางวัน` },
      { kind:"fill", label:`Fill in the Blank`, points:2,
        prompt:`The tour ___ at 8 a.m. and returns at 5 p.m.`,
        accepted:[`starts`],
        explanation:`ประธานเอกพจน์บุรุษที่ 3 ("the tour") ต้องเติม -s ที่กริยาในปัจจุบันกาลธรรมดา` },
      { kind:"choice", label:`Multiple Choice`, points:2,
        prompt:`The client asks about lunch. Which sentence is grammatically correct?`,
        options:[
          `The tour includes lunch.`,
          `The tours includes lunch.`,
          `The tour including lunch.`,
          `The tour has include lunch.`
        ], correctIndex:0,
        explanation:`"the tour" เป็นประธานเอกพจน์ ต้องใช้ "includes"; B ประธานพหูพจน์แต่กริยาเติม -s ผิด, C ใช้ gerund แทนกริยาแท้, D ใช้ auxiliary ผิด` },
      { kind:"short", label:`Short Response`,
        prompt:`Write a full reply covering both the schedule and the lunch question, using at least one time expression and the word "itinerary" or "departs".`,
        criteria:[
          { label:`ใช้ไวยากรณ์ถูกต้อง (starts / includes)`, points:1, test:r=>/\b(starts|includes)\b/i.test(r) },
          { label:`มี time expression ชัดเจน (เช่น "at 8 a.m.")`, points:1, test:r=>/\b(at\s+\d{1,2}(:\d{2})?\s*(a\.?m\.?|p\.?m\.?)?|\d{1,2}\s*(a\.?m\.?|p\.?m\.?))\b/i.test(r) },
          { label:`ใช้คำศัพท์ itinerary / departs`, points:1, test:r=>/\b(itinerary|departs?)\b/i.test(r) }
        ] }
    ]
  },
  {
    title: `Booking`,
    skill: `Payment Specialist`,
    client: `We has 15 people. How much is deposit?`,
    outro: `The booking is confirmed. But before anyone travels, there's one more important thing to check — documents.`,
    questions: [
      { kind:"choice", label:`Interpret the Message`, points:2,
        prompt:`What two things does the client need from you?`,
        options:[
          `Confirmation of the group size and the deposit amount`,
          `Confirmation of the group size and the total tour price`,
          `The deposit amount and the refund policy`,
          `The refund policy and the total tour price`
        ], correctIndex:0,
        explanation:`ข้อความกล่าวถึงจำนวนคน (ผิดไวยากรณ์) และถามเรื่องมัดจำโดยตรง` },
      { kind:"choice", label:`True / False`, points:2,
        prompt:`'You have to giving 30% deposit before we can confirm.' is grammatically correct.`,
        options:[`True`,`False`], correctIndex:1,
        explanation:`หลัง "have to" ต้องตามด้วยกริยารูปพื้นฐาน (give ไม่ใช่ giving)` },
      { kind:"fill", label:`Fill in the Blank`, points:2,
        prompt:`Thank you. You ___ 15 people in your group.`,
        accepted:[`have`],
        explanation:`ประธาน "you" ใช้กับ "have" เสมอ ไม่ใช่ "has"` },
      { kind:"choice", label:`Multiple Choice`, points:2,
        prompt:`Which sentence explains the deposit requirement most clearly and correctly?`,
        options:[
          `Please pay the deposit whenever you want.`,
          `A 30% deposit is required to confirm your booking.`,
          `You have to give us money first before we can start.`,
          `We recommend considering a deposit sometime before departure.`
        ], correctIndex:1,
        explanation:`B ระบุจำนวนและวัตถุประสงค์ชัดเจน ตัวเลือกอื่นคลุมเครือหรือไม่เป็นทางการ` },
      { kind:"short", label:`Short Response`,
        prompt:`Write your reply, confirming the group size correctly and stating a deposit amount or percentage.`,
        criteria:[
          { label:`ใช้ "you have" ถูกต้อง`, points:2, test:r=>/\byou\s+have\b/i.test(r) },
          { label:`ระบุจำนวนหรือเปอร์เซ็นต์มัดจำชัดเจน`, points:2, test:r=>/\bdeposit\b/i.test(r) && /(\d+%|\$\d+|\d+\s*(baht|thb))/i.test(r) },
          { label:`ประโยคสมบูรณ์ เป็นมืออาชีพ`, points:2, test:r=>/[.!]\s*$/.test(r.trim()) }
        ] }
    ]
  },
  {
    title: `Travel Documents`,
    skill: `Document Officer`,
    client: `The guides is friendly. Also, my passport expires in 3 months, is it ok?`,
    outro: `Documents are sorted. The group is on the road now — but travel doesn't always go smoothly.`,
    questions: [
      { kind:"choice", label:`True / False`, points:2,
        prompt:`'Please check that your passport are valid for six months.' is correct English.`,
        options:[`True`,`False`], correctIndex:1,
        explanation:`"passport" เป็นเอกพจน์ ต้องใช้ "is" ไม่ใช่ "are"` },
      { kind:"fill", label:`Fill in the Blank`, points:2,
        prompt:`Our guides ___ very friendly and experienced.`,
        accepted:[`are`],

/* ---------------------------------------------------
   SOUND (synthesized — no external audio files needed)
--------------------------------------------------- */
let audioCtx = null;
function getAudioCtx(){
  if (!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(freqs, durations, type, gainPeak){
  const ctx = getAudioCtx();
  let t = ctx.currentTime;
  freqs.forEach((f,i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(gainPeak, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + durations[i]);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + durations[i] + 0.02);
    t += durations[i];
  });
}
function safePlay(fn){
  try { fn(); } catch (e) { /* audio unsupported or blocked — ignore */ }
}
function playCorrectSound(){ safePlay(() => playTone([523.25, 659.25, 783.99], [0.09, 0.09, 0.16], "triangle", 0.13)); }
function playWrongSound(){ safePlay(() => playTone([220, 164.81], [0.14, 0.24], "sawtooth", 0.11)); }
function playPartialSound(){ safePlay(() => playTone([392, 392], [0.08, 0.14], "square", 0.09)); }

function renderRep(){
  const liveScore = state.score + stageBuffer;
  const pct = MAX_SCORE ? liveScore / MAX_SCORE : 0;
  const started = state.startTime !== null;
  const starCount = started ? Math.max(1, Math.min(5, Math.ceil(pct * 5) || 1)) : 0;
  document.getElementById('starDisplay').textContent = "★".repeat(starCount) + "☆".repeat(5 - starCount);
  const ranks = ["New Travel Agency","Trusted Agency","Professional Agency","Premium Tour Company","Best Tour Company Award"];
  document.getElementById('rankLabel').textContent = started ? ranks[Math.max(0,starCount-1)] : ranks[0];
  document.getElementById('scoreDisplay').textContent = started ? `Score: ${liveScore} / ${MAX_SCORE}` : "";
}

function fmtTime(ms){
  const totalSec = Math.floor(ms/1000);
  const m = Math.floor(totalSec/60);
  const s = totalSec%60;
  return `${m}m ${s.toString().padStart(2,'0')}s`;
}

--------------------------------------------------- */
function loadLeaderboard(){
  try { return JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]"); }
  catch (e) { return []; }
}
function saveLeaderboardEntry(entry){
  const list = loadLeaderboard();
  list.push(entry);
  list.sort((a,b) => b.score - a.score);
  localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(list.slice(0, 50)));
}
function renderLeaderboard(){
  const list = loadLeaderboard();
  const rows = list.length
    ? list.map((e,i) => `<tr><td>${i+1}</td><td>${escapeHtml(e.name)}</td><td>${e.score}/${e.maxScore}</td><td>${escapeHtml(e.date)}</td></tr>`).join("")
    : `<tr><td colspan="4" style="text-align:center;">No scores yet on this device.</td></tr>`;
  cardEl.innerHTML = `
    <div class="stage-title" style="justify-content:center">Leaderboard</div>
    <p style="text-align:center; font-size:15px; color:#8a7350;">Scores are saved on this device only.</p>

  stageBuffer = 0;

/* ---------------------------------------------------
   MAP
--------------------------------------------------- */
function renderMap(){
  const nextIndex = state.completedStages.length;
  let hotspotsHtml = "";
  stages.forEach((st, i) => {
    const pos = mapHotspots[i];
    const isDone = state.completedStages.includes(i);
    const isNext = i === nextIndex;
    let cls = "hotspot";
    let inner = `<div class="ring"></div>`;
    if (isDone){
      cls += " done";
      inner = `<div class="badge">✅</div>`;
    } else if (!isNext){
      cls += " locked";
      inner = `<div class="badge">\u{1F512}</div>`;
    }
    const clickable = isNext ? `onclick="enterStage(${i})"` : "";
    hotspotsHtml += `<button class="${cls}" style="left:${pos.left}%;top:${pos.top}%" title="Stage ${i+1}: ${escapeHtml(st.title)}" ${clickable} ${!isNext ? "disabled" : ""}>${inner}</button>`;
  });

  cardEl.innerHTML = `
    ${navHtml(false)}
    <div class="stage-title">Village Map</div>
    <div class="map-wrap">
      <img src="assets/village-map.png" alt="Happy Journey Tours village map">
      ${hotspotsHtml}
    </div>
    <div class="map-caption">${nextIndex < stages.length ? "Tap the glowing building to start your next stage." : "All stages complete — head to the dock!"}</div>
    ${nextIndex >= stages.length ? `<div class="btn-row" style="justify-content:center"><button class="btn-gold" onclick="renderEnd()">Board the Boat Home</button></div>` : ""}
  `;
}

--------------------------------------------------- */
function enterStage(i){
  state.stageIndex = i;
  state.questionIndex = 0;
  stageBuffer = 0;
  const stage = stages[i];
  if (stage.intro){
    renderNarration(stage.intro, () => renderQuestion());
  } else {
    renderQuestion();
  }
}

function renderQuestion(){
  const stage = stages[state.stageIndex];
  const q = stage.questions[state.questionIndex];

  let bodyHtml = "";
  if (q.kind === "choice"){
    const letters = ["A","B","C","D"];
    bodyHtml = `
      <div class="choices" id="choiceList">
        ${q.options.map((opt,idx) => `<button class="choice-btn" data-idx="${idx}" onclick="submitChoice(${idx})"><span class="choice-letter">${letters[idx]}</span>${opt}</button>`).join("")}
      </div>`;
  } else if (q.kind === "fill"){
    bodyHtml = `
      <input type="text" class="fill-input" id="fillInput" placeholder="Type your answer...">
      <div class="btn-row"><button class="btn-forest" id="fillSubmitBtn" onclick="submitFill()">Submit</button></div>`;
  } else if (q.kind === "short"){
    bodyHtml = `
      <textarea class="short-textarea" id="shortInput" placeholder="Write your reply here..."></textarea>
      <div class="btn-row"><button class="btn-forest" id="shortSubmitBtn" onclick="submitShort()">Submit</button></div>`;
  }

  cardEl.innerHTML = `
    ${navHtml(true)}
    <div class="stage-title">Stage ${state.stageIndex+1}/8 — ${stage.title}</div>
    <div class="skill-badge">Skill focus: ${stage.skill}</div>
    <div class="row-flex">
      <div class="avatar idle"></div>
      <div class="chat-bubble">
        <span class="who">Client</span>
        ${stage.client}
      </div>
    </div>
    <div class="progress-label">Question ${state.questionIndex+1} of ${stage.questions.length}</div>
    <div class="qtype-label">${q.label}</div>
    <div class="prompt-box">${q.prompt}</div>
    ${bodyHtml}
    <div class="feedback" id="feedback"></div>
  `;
}

function normalize(s){
  return s.trim().toLowerCase().replace(/[.!?]+$/,"");
}

function awardPoints(pts){
  stageBuffer += pts;
  renderRep();
}

function showReveal(correct, explanationHtml, pointsEarned, pointsMax){
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct ? 'ok' : 'bad');
  fb.innerHTML = `
    <span class="reaction">${correct ? "✅ Correct!" : "❌ Not quite"} (+${pointsEarned}/${pointsMax})</span>
    <div>${explanationHtml}</div>
    <div class="btn-row"><button class="btn-gold" onclick="nextQuestion()">Continue</button></div>
  `;
}

function submitChoice(idx){
  const stage = stages[state.stageIndex];
  const q = stage.questions[state.questionIndex];
  const correct = idx === q.correctIndex;

  document.querySelectorAll('#choiceList .choice-btn').forEach((btn,i) => {
    btn.disabled = true;
    if (i === q.correctIndex) btn.classList.add('opt-correct');
    else if (i === idx) btn.classList.add('opt-wrong');
  });

  const pts = correct ? q.points : 0;
  awardPoints(pts);
  safePlay(correct ? playCorrectSound : playWrongSound);
  showReveal(correct, q.explanation, pts, q.points);
}

function submitFill(){
  const stage = stages[state.stageIndex];
  const q = stage.questions[state.questionIndex];
  const input = document.getElementById('fillInput');
  const val = normalize(input.value);
  const correct = q.accepted.some(a => normalize(a) === val);
  input.disabled = true;
  input.style.borderColor = correct ? 'var(--forest)' : 'var(--heart)';
  document.getElementById('fillSubmitBtn').disabled = true;

  const pts = correct ? q.points : 0;
  awardPoints(pts);
  safePlay(correct ? playCorrectSound : playWrongSound);
  showReveal(correct, `Correct answer: <b>${q.accepted[0]}</b><br>${q.explanation}`, pts, q.points);
}

function submitShort(){
  const stage = stages[state.stageIndex];
  const q = stage.questions[state.questionIndex];
  const input = document.getElementById('shortInput');
  const reply = input.value;
  if (!reply.trim()){
    alert("Please write a reply before submitting.");
    return;
  }
  input.disabled = true;
  document.getElementById('shortSubmitBtn').disabled = true;

  let earned = 0;
  const maxPts = q.criteria.reduce((s,c)=>s+c.points,0);
  const rows = q.criteria.map(c => {
    const ok = c.test(reply);
    if (ok) earned += c.points;
    return `<li>${ok ? "✅" : "❌"} ${c.label} (${c.points} pt${c.points>1?"s":""})</li>`;
  }).join("");

  awardPoints(earned);
  if (earned === maxPts) safePlay(playCorrectSound);
  else if (earned === 0) safePlay(playWrongSound);
  else safePlay(playPartialSound);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (earned === maxPts ? 'ok' : (earned > 0 ? 'mid' : 'bad'));
  fb.innerHTML = `
    <span class="reaction">Score: +${earned}/${maxPts}</span>
    <ul class="criteria-list">${rows}</ul>
    <div class="btn-row"><button class="btn-gold" onclick="nextQuestion()">Continue</button></div>
  `;
}

function nextQuestion(){
  const stage = stages[state.stageIndex];
  state.questionIndex++;
  if (state.questionIndex < stage.questions.length){
    renderQuestion();
    return;
  }

  state.score += stageBuffer;
  stageBuffer = 0;
  if (!state.completedStages.includes(state.stageIndex)) state.completedStages.push(state.stageIndex);
  renderRep();

  const isLastStage = state.stageIndex === stages.length - 1;
  const narrationText = isLastStage ? stage.final : stage.outro;
  renderNarration(narrationText, () => {
    if (isLastStage) renderEnd();
    else renderMap();
  }, isLastStage ? "See Final Report" : "Back to Map");
}

/* ---------------------------------------------------
   END SCREEN
--------------------------------------------------- */
function renderEnd(){
  const elapsed = Date.now() - state.startTime;
  const pct = Math.round((state.score / MAX_SCORE) * 100);
  let mood = "\u{1F610} Average Trip";
  if (pct >= 80) mood = "\u{1F604} Happy Tourists!";
  else if (pct < 50) mood = "\u{1F621} Complaint Submitted";

  cardEl.innerHTML = `
    ${navHtml(true)}
    <div class="stage-title" style="justify-content:center">Trip Complete!</div>
    <p style="text-align:center;">Great work, <b>${escapeHtml(state.name)}</b>! Here is your final report.</p>
    <div style="text-align:center"><span class="stamp">${mood}</span></div>
    <div class="score-grid">
      <div class="score-box"><div class="n">${state.score} / ${MAX_SCORE}</div><div class="l">TOTAL SCORE</div></div>
      <div class="score-box"><div class="n">${pct}%</div><div class="l">SATISFACTION</div></div>
      <div class="score-box"><div class="n">${fmtTime(elapsed)}</div><div class="l">TIME SPENT</div></div>
      <div class="score-box"><div class="n">${state.completedStages.length} / 8</div><div class="l">STAGES COMPLETED</div></div>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-sky" onclick="submitResults()">Save My Results</button>
    </div>
    <div class="save-status" id="saveStatus" style="text-align:center;"></div>
  `;
}

/* ---------------------------------------------------
   SAVE RESULTS (Apps Script + local leaderboard)
--------------------------------------------------- */
async function submitResults(){
  const elapsedMin = ((Date.now() - state.startTime) / 60000).toFixed(2);
  const statusEl = document.getElementById('saveStatus');

  saveLeaderboardEntry({
    name: state.name,
    score: state.score,
    maxScore: MAX_SCORE,
    date: new Date().toLocaleDateString()
  });

  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_YOUR")){
    statusEl.style.color = "var(--bad)";
    statusEl.textContent = "No Apps Script URL configured — results were saved to the local leaderboard only.";
    return;
  }

  statusEl.style.color = "var(--forest)";
  statusEl.textContent = "Saving...";

  const payload = {
    name: state.name,
    studentId: state.studentId,
    score: state.score,
    timeSpent: elapsedMin
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    statusEl.textContent = "Results submitted! (If your teacher's sheet doesn't update, check the Apps Script deployment settings.)";
  } catch (err) {
    statusEl.style.color = "var(--bad)";
    statusEl.textContent = "Could not reach the server, but your score was saved to the local leaderboard.";
  }
}

/* ---------------------------------------------------
   INIT
--------------------------------------------------- */
renderRep();
renderFront();
</script>
