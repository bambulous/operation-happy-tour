<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Happy Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#f6ecd6;
    --parchment-dark:#ecdcb8;
    --ink:#3b2a1a;
    --forest:#3f7a4a;
    --forest-dark:#2c5934;
    --sky:#7fb8d9;
    --gold:#e0a83e;
    --heart:#e2636b;
    --paper-line:#d8c9a3;
    --bad:#a1442c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'VT323', monospace;
    font-size:19px;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 10%, #cfe8c9 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, #bfe0ee 0%, transparent 40%),
      linear-gradient(180deg,#e8f3e2 0%, #dcefe0 40%, #cfe6d6 100%);
    padding:20px 12px 50px;
    image-rendering:pixelated;
  }
  .wrap{max-width:920px;margin:0 auto;}
  .pixel-font{font-family:'Press Start 2P', monospace;}

  /* Pixel panel frame used everywhere */
  .pixel-panel{
    background:var(--parchment);
    border:4px solid var(--ink);
    box-shadow:0 0 0 4px var(--parchment), 0 0 0 8px var(--ink), 0 8px 0 0 rgba(0,0,0,0.25);
    border-radius:2px;
  }

  /* Header sign */
  .sign{
    background:linear-gradient(180deg,#9c6a3e,#7a4a26);
    padding:14px 18px;
    text-align:center;
    position:relative;
  }
  .sign h1{
    font-family:'Press Start 2P', monospace;
    color:#fff6e2;
    font-size:clamp(13px,3vw,18px);
    margin:0 0 8px;
    line-height:1.6;
  }
  .sign .sub{
    color:#ffe9c2;
    font-size:16px;
  }

  /* Reputation bar */
  .rep{
    margin-top:12px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .rep .stars{color:var(--gold); letter-spacing:2px; font-size:20px;}
  .rep .hearts{letter-spacing:3px; font-size:18px;}
  .rep .label{font-family:'Press Start 2P'; font-size:9px; color:#5a3419; display:block; margin-bottom:2px;}

  .card{
    margin-top:14px;
    padding:20px;
    position:relative;
  }
  .stage-title{
    font-family:'Press Start 2P';
    color:var(--forest-dark);
    font-size:13px;
    margin:0 0 14px;
    line-height:1.8;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .situation{
    background:#fff;
    border:3px solid var(--paper-line);
    padding:10px 14px;
    font-size:19px;
    margin-bottom:12px;
  }
  .row-flex{display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap;}
  .chat-bubble{
    background:#fff;
    border:3px solid var(--paper-line);
    padding:12px 16px;
    flex:1 1 260px;
    font-size:20px;
    line-height:1.4;
    position:relative;
  }
  .chat-bubble .who{
    font-family:'Press Start 2P';
    font-size:9px;
    color:#7a4a26;
    display:block;
    margin-bottom:6px;
  }
  .vocab-hint{
    font-size:16px;
    background:#fff2cf;
    border:2px dashed var(--gold);
    padding:6px 10px;
    display:inline-block;
    margin:12px 0;
  }

  /* Avatar sprite crops */
  .avatar{
    width:110px;height:170px;
    background-image:url('assets/tour-officer-sprites.png');
    background-repeat:no-repeat;
    background-size:1165px 777px;
    image-rendering:pixelated;
    flex:0 0 auto;
    border:3px solid var(--paper-line);
    background-color:#eaf3e6;
  }
  .avatar.idle{background-position:-505px -72px;}
  .avatar.talk{background-position:-1055px -72px;}
  .avatar-portrait{
    width:220px;height:148px;
    background-image:url('assets/tour-officer-sprites.png');
    background-repeat:no-repeat;
    background-size:690px 460px;
    background-position:-7px -76px;
    image-rendering:pixelated;
    border:3px solid var(--paper-line);
    margin:0 auto 10px;
  }

  /* Choices */
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
  .choice-btn{
    text-align:left;
    background:#fff;
    border:3px solid var(--paper-line);
    padding:12px 14px;
    font-family:'VT323';
    font-size:19px;
    cursor:pointer;
    color:var(--ink);
    line-height:1.35;
  }
  .choice-btn:hover:not(:disabled){border-color:var(--forest); background:#f2f9f0;}
  .choice-btn:disabled{cursor:default; opacity:0.55;}
  .choice-btn.picked-best{border-color:var(--forest); background:#e2f4e0;}
  .choice-btn.picked-okay{border-color:var(--gold); background:#fdf2dc;}
  .choice-btn.picked-rude{border-color:var(--heart); background:#fdecec;}
  .choice-letter{
    font-family:'Press Start 2P'; font-size:10px; color:#7a4a26; margin-right:8px;
  }

  button{
    font-family:'Press Start 2P';
    font-size:12px;
    border:3px solid var(--ink);
    padding:12px 18px;
    cursor:pointer;
    color:#fff;
    line-height:1.6;
  }
  button:active{transform:translateY(2px);}
  .btn-forest{background:var(--forest); box-shadow:0 4px 0 var(--forest-dark);}
  .btn-gold{background:var(--gold); box-shadow:0 4px 0 #a97a1f; color:#4a3407;}
  .btn-sky{background:var(--sky); box-shadow:0 4px 0 #4f8aab;}
  .btn-row{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;}

  .feedback{
    margin-top:16px;
    border:3px solid var(--paper-line);
    padding:14px;
    font-size:19px;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback.ok{background:#e2f4e0; border-color:var(--forest);}
  .feedback.mid{background:#fdf2dc; border-color:var(--gold);}
  .feedback.bad{background:#fdecec; border-color:var(--heart);}
  .feedback .reaction{font-family:'Press Start 2P'; font-size:12px; margin-bottom:8px; display:block;}

  /* Start / name entry */
  .start-card{text-align:center;}
  .start-card input{
    width:100%;
    max-width:320px;
    padding:9px 10px;
    border:3px solid var(--paper-line);
    font-family:'VT323';
    font-size:19px;
    margin:6px 0;
  }
  .field-label{font-family:'Press Start 2P'; font-size:10px; color:#5a3419; display:block; margin-top:14px;}

  /* Village map */
  .map-wrap{
    position:relative;
    width:100%;
    border:3px solid var(--ink);
  }
  .map-wrap img{display:block; width:100%; height:auto; image-rendering:pixelated;}
  .hotspot{
    position:absolute;
    width:16%; height:20%;
    transform:translate(-50%,-50%);
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
  }
  .hotspot .ring{
    width:100%; height:100%;
    border-radius:50%;
    border:4px solid var(--gold);
    box-shadow:0 0 0 4px rgba(255,255,255,0.5);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.55; transform:scale(0.92);}
    50%{opacity:1; transform:scale(1.05);}
  }
  .hotspot.locked{cursor:not-allowed;}
  .hotspot.locked .badge{
    width:100%; height:100%; border-radius:50%;
    background:rgba(59,42,26,0.55);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
  }
  .hotspot.done .badge{
    width:100%; height:100%; border-radius:50%;
    background:rgba(63,122,74,0.35);
    border:4px solid var(--forest);
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
  }
  .map-caption{
    text-align:center;
    font-size:18px;
    margin-top:10px;
    color:#4a5a44;
  }

  /* End / game over screens */
  .score-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:16px 0;
  }
  .score-box{
    background:#fff;
    border:3px solid var(--paper-line);
    padding:10px;
    text-align:center;
  }
  .score-box .n{font-family:'Press Start 2P'; font-size:18px; color:var(--forest-dark);}
  .score-box .l{font-size:14px; color:#8a7350;}
  .stamp{
    font-family:'Press Start 2P';
    display:inline-block;
    border:4px double var(--heart);
    color:var(--heart);
    padding:10px 16px;
    font-size:13px;
    transform:rotate(-3deg);
    margin:12px 0;
    line-height:1.8;
  }
  .save-status{font-size:16px; margin-top:10px;}
  footer{text-align:center; font-size:14px; color:#7a8f7a; margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="sign pixel-panel">
    <h1>Operation Happy Tour</h1>
    <div class="sub">Happy Journey Tours &mdash; Make Every Tourist Smile!</div>
  </div>

  <div class="rep pixel-panel" id="repBar">
    <div><span class="label">Agency Rank</span><span class="stars" id="starDisplay">&#9733;&#9733;&#9733;&#9733;&#9733;</span> <span id="rankLabel"></span></div>
    <div class="hearts" id="heartDisplay"></div>
  </div>

  <div class="card pixel-panel" id="card"></div>

  <footer>Built for classroom use &mdash; Basic Grammar in Context &middot; RMUTK</footer>
</div>

<script>
/* ---------------------------------------------------
   CONFIG
--------------------------------------------------- */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwy4Iuf7mP4d2gqA2dRHUpBO2PctebStWkM2eyFpg2QFSW0mVnwvqEIc_-GDmVsVeRY/exec";

/* ---------------------------------------------------
   GAME DATA
   Each mission has 3 pre-written reply choices:
   best  = polite + grammatically correct + uses target vocab (full points, heart restored)
   okay  = correct information but plain/incomplete (partial points, no heart change)
   rude  = repeats the customer's grammar mistake and/or dismissive tone (0 points, lose a heart)
--------------------------------------------------- */
const missions = [
  {
    icon: "\u{1F4E9}",
    title: "Customer Enquiry",
    skill: "Polite Communication",
    situation: "A family of four wants a tour next weekend. Reply politely and confirm you can help.",
    customer: "Hello. We are 4 people. Can you helps us book a tour next weekend?",
    vocabHint: "Target vocabulary: itinerary",
    maxPoints: 15,
    choices: [
      { tier:"best", points:15, text:"Hello! Thank you for reaching out — yes, we can definitely help you book a tour for 4 people next weekend. I'll send over the itinerary shortly.",
        feedback:"The customer is delighted! It directly confirms yes, fixes ‘helps’ → ‘help’, and uses ‘itinerary’ naturally." },
      { tier:"okay", points:8, text:"Thank you for your message! Before booking, could you let us know your preferred pickup location and time?",
        feedback:"The customer is a little unsure — this is polite and grammatically fine, but it never actually confirms you can help, and skips ‘itinerary’ entirely." },
      { tier:"rude", points:0, text:"Hi there! We loves helping families plan their perfect getaway, and next weekend is one of our busiest times, so we will try our best to see what we can maybe do for you and your group!",
        feedback:"The customer is confused! Despite being long and cheerful, it has a grammar mistake (‘We loves’) and never gives a clear yes — ‘try our best’ and ‘maybe’ leave the booking unconfirmed." }
    ]
  },
  {
    icon: "\u{1F5D3}\u{FE0F}",
    title: "Tour Planning",
    skill: "Schedule Master",
    situation: "The customer wants to know if the tour includes lunch and what time it starts.",
    customer: "Does the tour includes lunch? What time it start?",
    vocabHint: "Target vocabulary: departs / departure",
    maxPoints: 15,
    choices: [
      { tier:"best", points:15, text:"Yes, lunch is included, and the tour departs at 9:00 AM from the hotel lobby.",
        feedback:"The customer is delighted! Both questions are answered directly, with correct grammar and ‘departs at’ used properly." },
      { tier:"okay", points:8, text:"Great question! Our tours are designed to give you the most enjoyable experience possible, and lunch is always part of the package.",
        feedback:"The customer is still waiting — this sounds nice and confirms lunch, but it completely ignores the departure time question." },
      { tier:"rude", points:0, text:"It start at 9am and lunch included too, don't worry about it!",
        feedback:"The customer notices the sloppiness — both answers are technically there, but ‘it start’ repeats the grammar mistake and the tone is too casual for a professional reply." }
    ]
  },
  {
    icon: "\u{1F4B3}",
    title: "Booking",
    skill: "Payment Specialist",
    situation: "The customer asks about the deposit and total price for the group.",
    customer: "We has 15 people. How much is deposit?",
    vocabHint: "Target vocabulary: deposit (with amount or percentage)",
    maxPoints: 15,
    choices: [
      { tier:"best", points:15, text:"Thank you! You have 15 people in your group, and the deposit required is 20% of the total price.",
        feedback:"The customer is delighted! ‘You have’ corrects the grammar, and the deposit amount is stated clearly." },
      { tier:"okay", points:8, text:"Thanks so much for letting us know the group size — we'll get back to you shortly with the full pricing breakdown and deposit details!",
        feedback:"The customer is still waiting — warm and well-written, but it never actually says how much the deposit is, which was the whole question." },
      { tier:"rude", points:0, text:"You has 15 people, deposit needed.",
        feedback:"The customer is annoyed! ‘You has’ repeats the grammar mistake, and there's still no actual deposit amount given." }
    ]
  },
  {
    icon: "\u{1F6C2}",
    title: "Travel Documents",
    skill: "Document Officer",
    situation: "The customer's guide is described, and they ask about passport requirements.",
    customer: "The guides is friendly. Also, my passport expires in 3 months, is it ok?",
    vocabHint: "Target vocabulary: valid",
    maxPoints: 15,
    choices: [
      { tier:"best", points:15, text:"Thank you! Our guides are friendly and experienced, and please note your passport must be valid for at least 6 months before travel.",
        feedback:"The customer is delighted! ‘Guides are’ is corrected, and the passport rule is explained clearly using ‘valid’." },
      { tier:"okay", points:8, text:"We're so glad to hear that! Our whole team works hard to make every trip special, and we want to make sure everything goes smoothly for you.",
        feedback:"The customer is still worried — this is warm and correctly written, but it never answers the passport question at all." },
      { tier:"rude", points:0, text:"The guide is friendly yes. 3 months should be fine probably.",
        feedback:"The customer got the wrong information! ‘The guide is’ is still wrong (should be ‘guides are’), and 3 months is actually NOT enough — most policies require 6 months' validity." }
    ]
  },
  {
    icon: "\u{1F9F3}",
    title: "During Trip",
    skill: "Information Expert",
    situation: "Flight delayed. One tourist is sick. Respond with support and next steps.",
    customer: "Our flight is delayed and one of my friends feel sick. What should we do?",
    vocabHint: "Target vocabulary: assist / assistance",
    maxPoints: 15,
    choices: [
      { tier:"best", points:15, text:"Please don't worry — we will assist you right away. I'm arranging help for your friend who feels sick, and I'll keep monitoring your flight delay.",
        feedback:"The customer is delighted! Calm and reassuring, fixes ‘feel’ → ‘feels’, and uses ‘assist’ with real, concrete help offered." },
      { tier:"okay", points:8, text:"Flight delays can definitely be stressful, and we completely understand how you must be feeling right now during this difficult situation.",
        feedback:"The customer feels heard, but not helped — this is sympathetic and grammatically correct, but offers zero actual assistance or next steps for the sick friend." },
      { tier:"rude", points:0, text:"That happens sometimes. Hope your friend feel better soon!",
        feedback:"The customer is unimpressed! ‘Friend feel’ is still ungrammatical, the tone is dismissive, and no real help is offered." }
    ]
  }
];

const finalBoss = {
  icon: "\u{1F3C6}",
  title: "The Difficult Customer",
  skill: "Final Challenge",
  situation: "This customer combines everything you have learned. Choose the reply that actually answers every part of their message — correctly.",
  customer: "Hello. We are a group of 12 people. Could you tell me if your package has airport transfers? The tour is next Friday. One guest's passport expires in four months. Can we change the booking date? Can you send the itinerary?",
  vocabHint: "Target vocabulary: transfer, itinerary, confirm, valid, deposit",
  maxPoints: 25,
  choices: [
    { tier:"best", points:25, text:"Thank you for reaching out! You have 12 people confirmed, our package includes airport transfers, and your guest's passport should be valid for at least 6 months so we recommend renewing it. We're happy to change your booking date, and I'll send the itinerary right away.",
      feedback:"The customer is delighted! Every single question was answered correctly — group size, transfers, passport validity, date change, and itinerary." },
    { tier:"okay", points:12, text:"Thanks for your detailed message! We truly appreciate loyal customers like you, and our team is fully committed to making sure your trip exceeds all expectations from start to finish.",
      feedback:"The customer is frustrated — this is long, warm, and grammatically perfect, but it doesn't answer a single one of the five questions that were actually asked." },
    { tier:"rude", points:0, text:"12 people ok. Transfers yes we have. Passport 4 months maybe fine. Date change contact office. Itinerary later.",
      feedback:"The customer is furious! The grammar is broken throughout, the passport advice is wrong (4 months is not enough), and the date-change request is deflected instead of handled." }
  ]
};

const allStages = [...missions, finalBoss];
const MAX_SCORE = allStages.reduce((s,m) => s + m.maxPoints, 0);

/* Approx center points (% of image) for each building on the village map */
const mapHotspots = [
  { left:17, top:28 },
  { left:47, top:23 },
  { left:74, top:23 },
  { left:74, top:45 },
  { left:17, top:69 },
  { left:46, top:75 }
];

/* ---------------------------------------------------
   STATE
--------------------------------------------------- */
let state = {
  name: "",
  studentId: "",
  screen: "name", // name | map | mission | end | gameover
  activeMission: -1,
  score: 0,
  hearts: 5,
  startTime: null,
  completed: []
};

const cardEl = document.getElementById('card');

function renderRep(){
  const pct = state.score / MAX_SCORE;
  const starCount = state.completed.length ? Math.max(1, Math.min(5, Math.ceil(pct * 5) || 1)) : 0;
  document.getElementById('starDisplay').textContent = "★".repeat(starCount) + "☆".repeat(5 - starCount);
  const ranks = ["New Travel Agency","Trusted Agency","Professional Agency","Premium Tour Company","Best Tour Company Award"];
  document.getElementById('rankLabel').textContent = state.completed.length ? ranks[Math.max(0,starCount-1)] : ranks[0];
  document.getElementById('heartDisplay').textContent = "❤️".repeat(state.hearts) + "\u{1F90D}".repeat(5 - state.hearts);
}

function fmtTime(ms){
  const totalSec = Math.floor(ms/1000);
  const m = Math.floor(totalSec/60);
  const s = totalSec%60;
  return `${m}m ${s.toString().padStart(2,'0')}s`;
}

/* ---------------------------------------------------
   SCREENS
--------------------------------------------------- */
function renderName(){
  cardEl.innerHTML = `
    <div class="start-card">
      <div class="avatar-portrait"></div>
      <h2 class="stage-title" style="justify-content:center">Welcome, new agent!</h2>
      <p>Enter your details to begin your mission as a Tour Officer at <b>Happy Journey Tours</b>.</p>
      <span class="field-label">Full Name</span>
      <input type="text" id="inputName" placeholder="e.g. Somchai P.">
      <span class="field-label">Student ID</span>
      <input type="text" id="inputId" placeholder="e.g. 6512345678">
      <div class="btn-row" style="justify-content:center">
        <button class="btn-forest" onclick="startGame()">Enter the Village</button>
      </div>
    </div>
  `;
}

function renderMap(){
  const nextIndex = state.completed.length; // first not-yet-done mission
  let hotspotsHtml = "";
  allStages.forEach((m, i) => {
    const pos = mapHotspots[i];
    const isDone = state.completed.includes(i);
    const isNext = i === nextIndex;
    let cls = "hotspot";
    let inner = `<div class="ring"></div>`;
    if (isDone){
      cls += " done";
      inner = `<div class="badge">✅</div>`;
    } else if (!isNext){
      cls += " locked";
      inner = `<div class="badge">\u{1F512}</div>`;
    }
    const clickable = isNext ? `onclick="enterMission(${i})"` : "";
    hotspotsHtml += `<button class="${cls}" style="left:${pos.left}%;top:${pos.top}%" ${clickable} ${!isNext ? "disabled" : ""}>${inner}</button>`;
  });

  cardEl.innerHTML = `
    <div class="stage-title">Village Map</div>
    <div class="map-wrap">
      <img src="assets/village-map.png" alt="Happy Journey Tours village map">
      ${hotspotsHtml}
    </div>
    <div class="map-caption">${nextIndex < allStages.length ? "Tap the glowing building to start your next mission." : "All missions complete — head to the dock!"}</div>
    ${nextIndex >= allStages.length ? `<div class="btn-row" style="justify-content:center"><button class="btn-gold" onclick="renderEnd()">Board the Boat Home</button></div>` : ""}
  `;
}

function shuffleArray(arr){
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let currentChoices = [];

function enterMission(i){
  state.activeMission = i;
  state.screen = "mission";
  renderMission();
}

function renderMission(){
  const m = allStages[state.activeMission];
  const letters = ["A","B","C"];
  currentChoices = shuffleArray(m.choices);
  cardEl.innerHTML = `
    <div class="stage-title">${m.icon} Mission ${state.activeMission+1}: ${m.title}</div>
    <div class="situation"><b>Situation:</b> ${m.situation}</div>
    <div class="row-flex">
      <div class="avatar idle"></div>
      <div class="chat-bubble">
        <span class="who">Customer</span>
        ${m.customer}
      </div>
    </div>
    <div class="vocab-hint">${m.vocabHint}</div>
    <div class="choices" id="choices">
      ${currentChoices.map((c,idx) => `<button class="choice-btn" data-idx="${idx}" onclick="pickChoice(${idx})"><span class="choice-letter">${letters[idx]}</span>${c.text}</button>`).join("")}
    </div>
    <div class="feedback" id="feedback"></div>
  `;
}

function pickChoice(idx){
  const m = allStages[state.activeMission];
  const choice = currentChoices[idx];

  document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
  document.querySelector(`.choice-btn[data-idx="${idx}"]`).classList.add(
    choice.tier === "best" ? "picked-best" : (choice.tier === "okay" ? "picked-okay" : "picked-rude")
  );

  state.score += choice.points;
  if (choice.tier === "best") state.hearts = Math.min(5, state.hearts + 1);
  if (choice.tier === "rude") state.hearts = Math.max(0, state.hearts - 1);
  state.completed.push(state.activeMission);
  renderRep();

  const reactionLabel = choice.tier === "best" ? "\u{1F604} Customer delighted!" : (choice.tier === "okay" ? "\u{1F642} Customer satisfied" : "\u{1F620} Customer upset!");
  const fbClass = choice.tier === "best" ? "ok" : (choice.tier === "okay" ? "mid" : "bad");

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + fbClass;
  fb.innerHTML = `
    <span class="reaction">${reactionLabel}</span>
    <div class="row-flex">
      <div class="avatar talk"></div>
      <div>+${choice.points} / ${m.maxPoints} points<br>${choice.feedback}</div>
    </div>
    <div class="btn-row"><button class="btn-gold" onclick="afterMission()">Continue</button></div>
  `;

  if (state.hearts <= 0){
    fb.innerHTML += `<div style="margin-top:8px;color:var(--bad);font-weight:bold;">You're out of hearts!</div>`;
  }
}

function afterMission(){
  if (state.hearts <= 0){
    renderGameOver();
    return;
  }
  state.screen = "map";
  renderMap();
}

function renderGameOver(){
  cardEl.innerHTML = `
    <div class="stage-title" style="justify-content:center">Trip Ruined</div>
    <p style="text-align:center;">Too many unhappy customers, <b>${state.name}</b>. Happy Journey Tours has lost its reputation this round.</p>
    <div style="text-align:center"><span class="stamp">\u{1F494} Complaint Filed</span></div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-forest" onclick="location.reload()">Try Again</button>
    </div>
  `;
}

function renderEnd(){
  const elapsed = Date.now() - state.startTime;
  const pct = Math.round((state.score / MAX_SCORE) * 100);
  let mood = "\u{1F610} Average Trip";
  if (pct >= 80) mood = "\u{1F604} Happy Tourists!";
  else if (pct < 50) mood = "\u{1F621} Complaint Submitted";

  cardEl.innerHTML = `
    <div class="stage-title" style="justify-content:center">Trip Complete!</div>
    <p style="text-align:center;">Great work, <b>${state.name}</b>! Here is your final report.</p>
    <div style="text-align:center"><span class="stamp">${mood}</span></div>
    <div class="score-grid">
      <div class="score-box"><div class="n">${state.score} / ${MAX_SCORE}</div><div class="l">TOTAL SCORE</div></div>
      <div class="score-box"><div class="n">${pct}%</div><div class="l">SATISFACTION</div></div>
      <div class="score-box"><div class="n">${fmtTime(elapsed)}</div><div class="l">TIME SPENT</div></div>
      <div class="score-box"><div class="n">${state.hearts}/5</div><div class="l">HEARTS REMAINING</div></div>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-sky" onclick="submitResults()">Save My Results</button>
    </div>
    <div class="save-status" id="saveStatus" style="text-align:center;"></div>
  `;
}

/* ---------------------------------------------------
   LOGIC
--------------------------------------------------- */
function startGame(){
  const name = document.getElementById('inputName').value.trim();
  const id = document.getElementById('inputId').value.trim();
  if (!name || !id){
    alert("Please enter both your name and student ID before starting.");
    return;
  }
  state.name = name;
  state.studentId = id;
  state.startTime = Date.now();
  state.screen = "map";
  renderRep();
  renderMap();
}

async function submitResults(){
  const elapsedMin = ((Date.now() - state.startTime) / 60000).toFixed(2);
  const statusEl = document.getElementById('saveStatus');

  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_YOUR")){
    statusEl.style.color = "var(--bad)";
    statusEl.textContent = "No Apps Script URL configured — results were not saved online.";
    return;
  }

  statusEl.style.color = "var(--forest)";
  statusEl.textContent = "Saving...";

  const payload = {
    name: state.name,
    studentId: state.studentId,
    score: state.score,
    timeSpent: elapsedMin
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    statusEl.textContent = "Results submitted! (If your teacher's sheet doesn't update, check the Apps Script deployment settings.)";
  } catch (err) {
    statusEl.style.color = "var(--bad)";
    statusEl.textContent = "Could not reach the server. Check your internet connection and try again.";
  }
}

/* ---------------------------------------------------
   INIT
--------------------------------------------------- */
renderRep();
renderName();
</script>
</body>
</html>
